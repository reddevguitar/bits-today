<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>bit's today</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #101b30;
      --panel2: #0d1628;
      --line: #22304a;
      --text: #f3f7ff;
      --muted: #9fb0cf;
      --buy: #ff7a5c;
      --sell: #57a0ff;
      --good: #59d7a0;
      --warn: #f6bf4f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: linear-gradient(180deg, #08111f, #0d1830); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; }
    .hero { padding: 18px 16px 12px; }
    .eyebrow { display:flex; justify-content:space-between; color: var(--muted); font-size: 12px; margin-bottom: 10px; }
    .hero-card, .card { background: rgba(16,27,48,.96); border: 1px solid var(--line); border-radius: 18px; padding: 14px; box-shadow: 0 10px 24px rgba(0,0,0,.18); }
    .topline { font-size: 22px; font-weight: 900; line-height: 1.35; }
    .sub { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .chips, .grid2, .list, .candidate-list { display: grid; gap: 10px; }
    .chips { grid-template-columns: repeat(2, 1fr); margin-top: 12px; }
    .chip { background: var(--panel2); border: 1px solid var(--line); border-radius: 14px; padding: 10px; }
    .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .value { font-size: 18px; font-weight: 800; }
    .tabs { display:flex; gap:8px; padding: 0 16px 12px; overflow:auto; }
    .tab { flex:1; min-width:84px; text-align:center; padding:10px 8px; border:1px solid var(--line); border-radius:12px; color: var(--muted); background: rgba(13,22,40,.8); font-weight:700; cursor:pointer; }
    .tab.active { color: var(--text); border-color: #4d8cff; background: rgba(77,140,255,.16); }
    .screen { display:none; padding: 0 16px 16px; }
    .screen.active { display:block; }
    .section-title { font-size: 15px; font-weight: 900; margin: 16px 0 10px; }
    .grid2 { grid-template-columns: 1fr 1fr; }
    .metric { background: var(--panel2); border:1px solid var(--line); border-radius:14px; padding:10px; }
    .candidate { background: var(--panel2); border:1px solid var(--line); border-radius:16px; padding:12px; }
    .row { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
    .name { font-size:16px; font-weight:900; }
    .muted { color: var(--muted); font-size: 12px; }
    .score { color: var(--warn); font-weight:800; }
    .buy { color: var(--buy); }
    .sell { color: var(--sell); }
    .good { color: var(--good); }
    .pill { display:inline-block; margin-top:8px; padding:4px 8px; border-radius:999px; font-size:11px; font-weight:800; border:1px solid var(--line); color: var(--muted); }
    .list-item, .trade { background: var(--panel2); border:1px solid var(--line); border-radius:14px; padding:11px 12px; }
    .trade { border-left: 4px solid var(--line); }
    .trade.buyline { border-left-color: var(--buy); }
    .trade.selline { border-left-color: var(--sell); }
    .trade.holdline { border-left-color: #b9c6de; }
    pre { margin:0; white-space:pre-wrap; word-break:break-word; font-family:inherit; font-size:12px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="eyebrow"><span id="clock">--:--</span><span>bit's today · <span id="uiVersion">-</span></span></div>
      <div class="hero-card">
        <div class="label">6시간 자율 알트 사이클</div>
        <div class="topline" id="topLine">불러오는 중...</div>
        <div class="sub" id="heroSub">-</div>
        <div class="chips">
          <div class="chip"><div class="label">총 평가액</div><div class="value" id="valuation">-</div></div>
          <div class="chip"><div class="label">현금 비중</div><div class="value" id="cashRatio">-</div></div>
          <div class="chip"><div class="label">판단</div><div class="value" id="judgment">-</div></div>
          <div class="chip"><div class="label">자기평가</div><div class="value" id="selfEval">-</div></div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="overview">개요</div>
      <div class="tab" data-tab="portfolio">포트폴리오</div>
      <div class="tab" data-tab="trades">거래</div>
      <div class="tab" data-tab="report">리포트</div>
    </div>

    <div class="screen active" id="screen-overview">
      <div class="card">
        <div class="section-title">선호 후보 TOP 5</div>
        <div class="candidate-list" id="candidateList"></div>
      </div>
      <div class="section-title">시장 스코어카드</div>
      <div class="grid2" id="scoreGrid"></div>
      <div class="section-title">리스크 플랜</div>
      <div class="list" id="riskList"></div>
      <div class="section-title">이번 사이클 개선</div>
      <div class="list" id="improvementList"></div>
    </div>

    <div class="screen" id="screen-portfolio">
      <div class="card">
        <div class="section-title">포지션</div>
        <div class="candidate-list" id="positionList"></div>
      </div>
      <div class="section-title">로테이션 버킷</div>
      <div class="list" id="rotationList"></div>
      <div class="section-title">메이저 참고 신호</div>
      <div class="list" id="watchList"></div>
    </div>

    <div class="screen" id="screen-trades">
      <div class="card">
        <div class="section-title">최근 거래</div>
        <div class="list" id="tradeList"></div>
      </div>
    </div>

    <div class="screen" id="screen-report">
      <div class="card">
        <div class="section-title">최신 리포트</div>
        <pre id="report">불러오는 중...</pre>
      </div>
    </div>
  </div>
  <script>
    const NAME_MAP = { BTC:'비트코인', ETH:'이더리움', XRP:'리플', SOL:'솔라나', DOGE:'도지코인', SUPER:'슈퍼', CHZ:'칠리즈', BLUR:'블러', PIEVERSE:'파이버스' };
    const fmt = n => Math.round(Number(n || 0)).toLocaleString();
    const parse = v => typeof v === 'number' ? v : Number(String(v || '').replace(/[^0-9.-]/g, '')) || 0;
    function updateClock(){ const d=new Date(); document.getElementById('clock').textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    function switchTab(name){ document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name)); document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+name).classList.add('active'); }
    function setList(id, items, renderer){ const el=document.getElementById(id); el.innerHTML=''; (items||[]).forEach(item=>{ const div=document.createElement('div'); div.className=renderer.cls || 'list-item'; div.innerHTML=renderer(item); el.appendChild(div); }); if(!(items||[]).length){ el.innerHTML='<div class="list-item muted">데이터 없음</div>'; } }
    async function load(){
      const [statusRes, reportRes] = await Promise.all([fetch('./status.json?_='+Date.now()), fetch('./latest-report.md?_='+Date.now())]);
      const status = await statusRes.json();
      const report = await reportRes.text();
      const valuation = parse(status.last_valuation_krw);
      const cash = parse(status.cash_krw);
      const cashRatio = valuation ? ((cash / valuation) * 100).toFixed(1) : '0.0';
      document.getElementById('uiVersion').textContent = status.ui_version || '-';
      document.getElementById('topLine').textContent = status.top_line || '-';
      document.getElementById('heroSub').textContent = `${status.market_status || '-'} · ${status.fear_greed || '-'} · ${status.updated_at || '-'}`;
      document.getElementById('valuation').textContent = `₩${fmt(valuation)}`;
      document.getElementById('cashRatio').textContent = `${cashRatio}%`;
      document.getElementById('judgment').textContent = status.judgment || '-';
      document.getElementById('selfEval').textContent = `${status.self_evaluation?.score ?? '-'} / 10`;
      document.getElementById('report').textContent = report;

      setList('candidateList', status.preferred_buy_candidates, (c) => `
        <div class="candidate">
          <div class="row"><div><div class="name">${c.icon || '🪙'} ${NAME_MAP[c.symbol] || c.symbol} (${c.symbol})</div><div class="muted">${c.market || '-'} · ${c.role || '-'}</div></div><div class="score">${c.score ?? '-'}점</div></div>
          <div class="muted" style="margin-top:8px">${c.reason || '-'}</div>
          <div class="grid2" style="margin-top:10px">
            <div class="metric"><div class="label">배정</div><div class="value">₩${fmt(c.allocation_krw)}</div></div>
            <div class="metric"><div class="label">리스크</div><div class="value" style="font-size:14px">${c.risk || '-'}</div></div>
          </div>
          <div class="pill">무효화: ${c.invalidated_if || '-'}</div>
        </div>`);

      const scoreItems = Object.entries(status.scorecard || {}).map(([k,v]) => ({k,v}));
      setList('scoreGrid', scoreItems, (s) => `<div class="metric"><div class="label">${s.k}</div><div class="value">${s.v}/10</div></div>`);
      setList('riskList', (status.risk_plan?.exit_rules || []).map((text, i) => ({text, i})), (r) => `<div><strong>${r.i + 1}.</strong> ${r.text}</div>`);
      setList('improvementList', status.cycle_improvements || [], (text) => `<div>${text}</div>`);
      setList('positionList', status.positions || [], (p) => `
        <div class="candidate">
          <div class="row"><div><div class="name">${p.icon || '🪙'} ${NAME_MAP[p.symbol] || p.symbol} (${p.symbol})</div><div class="muted">${p.market || '-'}</div></div><div class="pill">${p.role || p.strategy || '-'}</div></div>
          <div class="grid2" style="margin-top:10px">
            <div class="metric"><div class="label">현재가</div><div class="value">${p.last_price_krw}</div></div>
            <div class="metric"><div class="label">보유수량</div><div class="value">${Number(p.amount || 0).toFixed(2)}</div></div>
            <div class="metric"><div class="label">손절 기준</div><div class="value">${p.risk_limit_pct ?? '-'}%</div></div>
            <div class="metric"><div class="label">익절 기준</div><div class="value">${p.profit_take_pct ?? '-'}%</div></div>
          </div>
          <div class="muted" style="margin-top:8px">${p.thesis || '-'}</div>
        </div>`);
      setList('rotationList', status.rotation_map || [], (r) => `<div><strong>${r.bucket}</strong><div class="muted">${(r.symbols || []).join(', ')}</div><div style="margin-top:6px">${r.note || '-'}</div></div>`);
      setList('watchList', status.reference_watchlist || [], (w) => `<div><strong>${w.icon || '🪙'} ${w.symbol}</strong> <span class="muted">${w.market || '-'}</span><div style="margin-top:6px">${w.reason || '-'}</div></div>`);
      setList('tradeList', status.recent_trades || [], (t) => {
        const a = String(t.action || '').toUpperCase();
        const cls = a.includes('BUY') ? 'trade buyline' : a.includes('SELL') ? 'trade selline' : 'trade holdline';
        return `<div class="${cls}"><div class="row"><div><strong>${t.symbol}</strong> · ${a}</div><div class="muted">${t.timestamp || '-'}</div></div><div style="margin-top:8px">체결가 ₩${fmt(t.price_krw)} · 수량 ${t.amount_delta ?? 0}</div><div class="muted" style="margin-top:6px">${t.reason || '-'}</div></div>`;
      });
    }
    updateClock(); setInterval(updateClock, 20000); document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab))); load(); setInterval(load, 60000);
  </script>
</body>
</html>
