<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bit's today</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --card: #141b34;
      --muted: #9fb0d9;
      --text: #edf2ff;
      --accent: #7aa2ff;
      --good: #45d483;
      --warn: #f3c969;
      --bad: #ff7b7b;
      --border: #263154;
      --gauge1: #45d483;
      --gauge2: #f3c969;
      --gauge3: #ff7b7b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #0b1020 0%, #121933 100%); color: var(--text); padding: 18px; }
    .wrap { max-width: 1180px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: 32px; }
    .sub { color: var(--muted); margin-bottom: 20px; }
    .grid, .two-col, .hero { display: grid; gap: 14px; }
    .hero { grid-template-columns: 1.2fr .9fr .9fr .9fr; margin-bottom: 18px; }
    .grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 18px; }
    .two-col { grid-template-columns: 1fr 1fr; margin-bottom: 14px; }
    .card { background: rgba(20,27,52,.92); border: 1px solid var(--border); border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.22); }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .value { font-size: 22px; font-weight: 700; line-height: 1.25; }
    .small { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .section-title { margin: 0 0 12px; font-size: 18px; }
    .pill { display: inline-block; padding: 7px 11px; border-radius: 999px; font-size: 14px; font-weight: 700; width: fit-content; }
    .bullish { background: rgba(69,212,131,.15); color: var(--good); }
    .neutral { background: rgba(243,201,105,.15); color: var(--warn); }
    .bearish { background: rgba(255,123,123,.15); color: var(--bad); }
    .list, .trades, .reports, .positions { display: grid; gap: 10px; }
    .item { padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: rgba(255,255,255,.02); }
    .item-title { font-weight: 600; margin-bottom: 6px; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; font-family: inherit; line-height: 1.6; font-size: 14px; }
    canvas { width: 100%; height: 300px; background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 12px; }
    .gauge { height: 14px; border-radius: 999px; background: linear-gradient(90deg, var(--gauge1), var(--gauge2), var(--gauge3)); position: relative; margin-top: 8px; }
    .needle { position: absolute; top: -4px; width: 4px; height: 22px; background: white; border-radius: 3px; }
    a { color: var(--accent); text-decoration: none; }
    @media (max-width: 980px) { .hero, .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>bit's today</h1>
    <div class="sub">공격형 멀티코인 가상 포트폴리오, 업비트 소형 알트는 흐름 따라 동적 편입</div>

    <div class="hero">
      <div class="card"><div class="label">현재 시황</div><div class="value" id="marketStatus">-</div><div class="small" id="timestamp">updated: -</div></div>
      <div class="card"><div class="label">공포탐욕지수</div><div class="value" id="fearGreed">-</div><div class="gauge"><div class="needle" id="fearNeedle" style="left:50%"></div></div></div>
      <div class="card"><div class="label">BTC 스냅샷</div><div class="value" id="btcSnapshot">-</div><div class="small" id="confidence">confidence: -</div></div>
      <div class="card"><div class="label">종합 투자의견</div><div class="value" id="judgment">-</div><div class="small" id="action">action: -</div></div>
    </div>

    <div class="two-col">
      <div class="card"><div class="section-title">멀티코인 가격 차트</div><canvas id="priceChart" width="700" height="300"></canvas></div>
      <div class="card"><div class="section-title">현재 픽한 코인 전략</div><div class="positions" id="positionList"></div></div>
    </div>

    <div class="two-col">
      <div class="card"><div class="section-title">최근 리포트</div><div class="reports" id="reportLinks"></div></div>
      <div class="card"><div class="section-title">최근 거래/판단</div><div class="trades" id="tradeList"></div></div>
    </div>

    <div class="grid">
      <div class="card"><div class="label">총 평가금액</div><div class="value" id="valuation">-</div><div class="small" id="returnPct">return: -</div></div>
      <div class="card"><div class="label">현금</div><div class="value" id="cash">-</div><div class="small" id="lastAction">last action: -</div></div>
      <div class="card"><div class="label">실현 손익</div><div class="value" id="realizedPnl">-</div><div class="small" id="tradeCount">trade count: -</div></div>
      <div class="card"><div class="label">초기 자금</div><div class="value" id="initialCash">-</div><div class="small">simulation only</div></div>
    </div>

    <div class="two-col">
      <div class="card"><div class="section-title">핵심 요약</div><div class="list" id="summaryList"></div></div>
      <div class="card"><div class="section-title">최신 리포트</div><pre id="report">불러오는 중...</pre></div>
    </div>
  </div>
  <script>
    function addItem(container, title, body) {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = '<div class="item-title">' + title + '</div><div>' + body + '</div>';
      container.appendChild(el);
    }
    function parseFearValue(text) {
      const m = String(text || '').match(/(\d{1,3})/);
      return m ? Math.max(0, Math.min(100, Number(m[1]))) : 50;
    }
    function drawChart(seriesMap) {
      const canvas = document.getElementById('priceChart');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const entries = Object.entries(seriesMap || {});
      if (!entries.length) { ctx.fillStyle = '#9fb0d9'; ctx.fillText('아직 멀티코인 차트 데이터가 부족해요.', 20, 40); return; }
      const colors = ['#7aa2ff','#45d483','#f3c969','#ff7b7b','#c084fc','#22d3ee','#fb7185'];
      const allVals = entries.flatMap(([, pts]) => pts.map(p => p.price_krw || 0).filter(Boolean));
      const min = Math.min(...allVals), max = Math.max(...allVals), pad = 30, w = canvas.width - pad * 2, h = canvas.height - pad * 2;
      ctx.strokeStyle = '#263154'; ctx.strokeRect(pad, pad, w, h);
      entries.forEach(([symbol, pts], idx) => {
        const vals = pts.map(p => p.price_krw || 0).filter(Boolean);
        if (!vals.length) return;
        ctx.beginPath();
        vals.forEach((v, i) => {
          const x = pad + (vals.length === 1 ? w / 2 : (i / (vals.length - 1)) * w);
          const y = pad + h - ((v - min) / ((max - min) || 1)) * h;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = colors[idx % colors.length];
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.fillStyle = colors[idx % colors.length];
        ctx.fillText(symbol, pad + 8, pad + 18 + idx * 16);
      });
    }
    async function load() {
      try {
        const [statusRes, reportRes] = await Promise.all([fetch('./status.json?_=' + Date.now()), fetch('./latest-report.md?_=' + Date.now())]);
        const status = await statusRes.json();
        const report = await reportRes.text();
        document.getElementById('marketStatus').textContent = status.market_status || '-';
        document.getElementById('fearGreed').textContent = status.fear_greed || '-';
        document.getElementById('btcSnapshot').textContent = status.btc_snapshot || '-';
        document.getElementById('judgment').textContent = status.judgment || '-';
        document.getElementById('timestamp').textContent = 'updated: ' + (status.updated_at || '-');
        document.getElementById('confidence').textContent = 'confidence: ' + (status.confidence || '-');
        document.getElementById('action').textContent = 'action: ' + (status.suggested_action || '-');
        document.getElementById('valuation').textContent = status.last_valuation_krw || '-';
        document.getElementById('returnPct').textContent = 'return: ' + ((status.return_pct ?? '-') + '%');
        document.getElementById('cash').textContent = status.cash_krw || '-';
        document.getElementById('lastAction').textContent = 'last action: ' + (status.last_action || '-');
        document.getElementById('realizedPnl').textContent = status.realized_pnl_krw || '-';
        document.getElementById('tradeCount').textContent = 'trade count: ' + (status.trade_count || 0);
        document.getElementById('initialCash').textContent = status.initial_cash_krw || '-';
        document.getElementById('report').textContent = report;
        const j = (status.judgment || '').toLowerCase();
        const el = document.getElementById('judgment'); el.className = 'value';
        if (j === 'bullish') el.classList.add('pill', 'bullish'); else if (j === 'bearish') el.classList.add('pill', 'bearish'); else if (j === 'neutral') el.classList.add('pill', 'neutral');
        const fear = parseFearValue(status.fear_greed); document.getElementById('fearNeedle').style.left = `calc(${fear}% - 2px)`;
        const summaryList = document.getElementById('summaryList'); summaryList.innerHTML = '';
        (status.summary || []).slice(0, 8).forEach((line, idx) => addItem(summaryList, '요약 ' + (idx + 1), line));
        const tradeList = document.getElementById('tradeList'); tradeList.innerHTML = '';
        (status.recent_trades || []).forEach((t) => addItem(tradeList, `${t.symbol || 'COIN'} · ${t.action || 'ACTION'} · ${t.timestamp || '-'}`, `price: ${t.price_krw ?? '-'} KRW<br>amount_delta: ${t.amount_delta ?? '-'}<br>cash_delta: ${t.cash_delta_krw ?? '-'} KRW<br>reason: ${t.reason || '-'}`));
        const reportLinks = document.getElementById('reportLinks'); reportLinks.innerHTML = '';
        (status.recent_reports || []).forEach((r) => addItem(reportLinks, r.title || r.file, `<a href="./reports/${r.file}" target="_blank">리포트 열기</a>`));
        const posList = document.getElementById('positionList'); posList.innerHTML = '';
        (status.positions || []).forEach((p) => addItem(posList, `${p.symbol} · ${p.market}`, `보유: ${p.amount}<br>평균매수: ${p.avg_buy_price_krw}<br>현재가: ${p.last_price_krw}<br>아이디어: ${p.thesis}<br>대응전략: ${p.strategy}`));
        if (!(status.positions || []).length) addItem(posList, '포지션 없음', '아직 편입된 코인이 없습니다.');
        drawChart(status.chart_series || {});
      } catch (e) {
        document.getElementById('report').textContent = '대시보드 데이터를 불러오지 못했습니다.\n' + e;
      }
    }
    load(); setInterval(load, 60000);
  </script>
</body>
</html>
