<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bit's today</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --card: #141b34;
      --muted: #9fb0d9;
      --text: #edf2ff;
      --accent: #7aa2ff;
      --good: #45d483;
      --warn: #f3c969;
      --bad: #ff7b7b;
      --border: #263154;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #121933 100%);
      color: var(--text);
      padding: 18px;
    }
    .wrap { max-width: 1080px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: 32px; }
    .sub { color: var(--muted); margin-bottom: 20px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: rgba(20,27,52,.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .value { font-size: 26px; font-weight: 700; line-height: 1.2; }
    .small { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .section-title { margin: 0 0 12px; font-size: 18px; }
    .pill {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      width: fit-content;
    }
    .bullish { background: rgba(69,212,131,.15); color: var(--good); }
    .neutral { background: rgba(243,201,105,.15); color: var(--warn); }
    .bearish { background: rgba(255,123,123,.15); color: var(--bad); }
    .list, .trades { display: grid; gap: 10px; }
    .item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.02);
    }
    .item-title { font-weight: 600; margin-bottom: 6px; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-family: inherit;
      line-height: 1.6;
      font-size: 14px;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 820px) {
      .two-col { grid-template-columns: 1fr; }
      .value { font-size: 22px; }
      h1 { font-size: 28px; }
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>bit's today</h1>
    <div class="sub">Bitcoin monitoring + paper trading dashboard, auto-refresh every 60s</div>

    <div class="grid">
      <div class="card">
        <div class="label">현재 판단</div>
        <div class="value" id="judgment">-</div>
        <div class="small" id="confidence">confidence: -</div>
      </div>
      <div class="card">
        <div class="label">추천 행동</div>
        <div class="value" id="action">-</div>
        <div class="small" id="timestamp">updated: -</div>
      </div>
      <div class="card">
        <div class="label">총 평가금액</div>
        <div class="value" id="valuation">-</div>
        <div class="small" id="returnPct">return: -</div>
      </div>
      <div class="card">
        <div class="label">보유 상태</div>
        <div class="value" id="btc">-</div>
        <div class="small" id="cash">cash: -</div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="section-title">핵심 요약</div>
        <div class="list" id="summaryList"></div>
      </div>
      <div class="card">
        <div class="section-title">포트폴리오</div>
        <div class="list">
          <div class="item"><div class="item-title">초기 자금</div><div id="initialCash">-</div></div>
          <div class="item"><div class="item-title">현재 현금</div><div id="cash2">-</div></div>
          <div class="item"><div class="item-title">평균 매수가</div><div id="avgBuy">-</div></div>
          <div class="item"><div class="item-title">현재 BTC 가격 기준</div><div id="lastPrice">-</div></div>
          <div class="item"><div class="item-title">실현 손익</div><div id="realizedPnl">-</div></div>
          <div class="item"><div class="item-title">최근 액션</div><div id="lastAction">-</div></div>
        </div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="section-title">최근 거래/판단</div>
        <div class="trades" id="tradeList"></div>
      </div>
      <div class="card">
        <div class="section-title">최신 리포트</div>
        <pre id="report">불러오는 중...</pre>
      </div>
    </div>
  </div>

  <script>
    function addItem(container, title, body) {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = '<div class="item-title">' + title + '</div><div>' + body + '</div>';
      container.appendChild(el);
    }

    async function load() {
      try {
        const [statusRes, reportRes] = await Promise.all([
          fetch('./status.json?_=' + Date.now()),
          fetch('./latest-report.md?_=' + Date.now())
        ]);
        const status = await statusRes.json();
        const report = await reportRes.text();

        document.getElementById('judgment').textContent = status.judgment || '-';
        document.getElementById('confidence').textContent = 'confidence: ' + (status.confidence || '-');
        document.getElementById('action').textContent = status.suggested_action || '-';
        document.getElementById('timestamp').textContent = 'updated: ' + (status.updated_at || '-');
        document.getElementById('valuation').textContent = status.last_valuation_krw || '-';
        document.getElementById('returnPct').textContent = 'return: ' + ((status.return_pct ?? '-') + '%');
        document.getElementById('btc').textContent = status.btc || '-';
        document.getElementById('cash').textContent = 'cash: ' + (status.cash_krw || '-');
        document.getElementById('cash2').textContent = status.cash_krw || '-';
        document.getElementById('initialCash').textContent = status.initial_cash_krw || '-';
        document.getElementById('avgBuy').textContent = status.avg_buy_price_krw || '-';
        document.getElementById('lastPrice').textContent = status.last_price_krw || '-';
        document.getElementById('realizedPnl').textContent = status.realized_pnl_krw || '-';
        document.getElementById('lastAction').textContent = status.last_action || '-';
        document.getElementById('report').textContent = report;

        const j = (status.judgment || '').toLowerCase();
        const el = document.getElementById('judgment');
        el.className = 'value';
        if (j === 'bullish') el.classList.add('pill', 'bullish');
        else if (j === 'bearish') el.classList.add('pill', 'bearish');
        else if (j === 'neutral') el.classList.add('pill', 'neutral');

        const summaryList = document.getElementById('summaryList');
        summaryList.innerHTML = '';
        (status.summary || []).forEach((line, idx) => addItem(summaryList, '요약 ' + (idx + 1), line));
        if (!(status.summary || []).length) addItem(summaryList, '요약', '아직 요약 데이터가 없습니다.');

        const tradeList = document.getElementById('tradeList');
        tradeList.innerHTML = '';
        (status.recent_trades || []).forEach((t, idx) => {
          addItem(tradeList, (t.action || 'ACTION') + ' · ' + (t.timestamp || '-'),
            'price: ' + (t.price_krw ?? '-') + ' KRW<br>btc_delta: ' + (t.btc_delta ?? '-') + '<br>cash_delta: ' + (t.cash_delta_krw ?? '-') + ' KRW<br>reason: ' + (t.reason || '-'));
        });
        if (!(status.recent_trades || []).length) addItem(tradeList, '거래 없음', '아직 가상 거래 기록이 없습니다.');
      } catch (e) {
        document.getElementById('report').textContent = '대시보드 데이터를 불러오지 못했습니다.\n' + e;
      }
    }
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
