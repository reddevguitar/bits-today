<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>bit's today</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel2: #152238;
      --line: #25324b;
      --text: #eef3ff;
      --muted: #95a2bf;
      --blue: #2c7df7;
      --up: #ff6b57;
      --down: #3f8cff;
      --good: #16c784;
      --warn: #f3ba2f;
      --bad: #ff5b6e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: linear-gradient(180deg, #0b1220 0%, #10192b 100%);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px 10px;
      font-weight: 700;
      font-size: 15px;
    }
    .title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      padding: 4px 16px 14px;
    }
    .search {
      margin: 0 12px 12px;
      background: #0d1626;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      background: #0f1728;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 14px 6px;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }
    .section {
      padding: 14px 14px 0;
    }
    .card {
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 16px 14px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 18px;
    }
    .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .big { font-size: 31px; font-weight: 800; }
    .mid { font-size: 22px; font-weight: 700; }
    .small { font-size: 12px; color: var(--muted); }
    .up { color: var(--up); }
    .down { color: var(--down); }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      background: #0f1728;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      overflow: auto;
    }
    .pill {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }
    .pill.active {
      color: var(--blue);
      border-color: var(--blue);
      background: rgba(44,125,247,.08);
    }
    .gauge-wrap {
      margin-top: 10px;
    }
    .gauge {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #2f8fef, #f1b63b, #ff5b6e);
      position: relative;
      overflow: hidden;
    }
    .needle {
      position: absolute;
      top: -2px;
      width: 4px;
      height: 16px;
      background: #fff;
      border-radius: 3px;
    }
    .list-head, .coin-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr .9fr .9fr;
      gap: 8px;
      align-items: center;
    }
    .list-head {
      color: var(--muted);
      font-size: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #101a2b;
    }
    .coin-row {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(37,50,75,.7);
      font-size: 14px;
    }
    .coin-name { font-weight: 700; }
    .coin-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .strategy-box, .note-box, .report-box {
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px;
      margin-top: 12px;
    }
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .strategy-item, .note-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(37,50,75,.7);
    }
    .strategy-item:last-child, .note-item:last-child { border-bottom: 0; }
    .strategy-title { font-weight: 700; margin-bottom: 6px; }
    .chart-wrap { margin-top: 10px; }
    canvas {
      width: 100%;
      height: 250px;
      background: #0d1626;
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .swatch { width: 10px; height: 10px; border-radius: 99px; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      line-height: 1.55;
      color: #d9e2f2;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar"><span id="clock">--:--</span><span>bit's today</span></div>
    <div class="title">투자내역</div>
    <div class="search">🔍 코인명/심볼 검색</div>

    <div class="tabs">
      <div class="tab active">보유자산</div>
      <div class="tab">투자손익</div>
      <div class="tab">거래내역</div>
      <div class="tab">리포트</div>
    </div>

    <div class="section">
      <div class="card">
        <div class="summary-grid">
          <div>
            <div class="label">총 보유자산</div>
            <div class="big" id="valuation">-</div>
          </div>
          <div>
            <div class="label">평가손익</div>
            <div class="mid up" id="profitValue">-</div>
            <div class="small" id="returnPct">-</div>
          </div>
          <div>
            <div class="label">보유 KRW</div>
            <div class="mid" id="cash">-</div>
          </div>
          <div>
            <div class="label">종합 투자의견</div>
            <div class="mid" id="judgment">-</div>
            <div class="small" id="action">-</div>
          </div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="pill active">KRW</div>
      <div class="pill">BTC</div>
      <div class="pill">USDT</div>
      <div class="pill">현재 시황</div>
      <div class="pill">공포탐욕</div>
    </div>

    <div class="section">
      <div class="card">
        <div class="label">현재 시황</div>
        <div class="mid" id="marketStatus">-</div>
        <div class="small" id="btcSnapshot">-</div>
        <div class="small" id="confidence">-</div>
        <div class="gauge-wrap">
          <div class="label">공포탐욕지수</div>
          <div class="mid" id="fearGreed">-</div>
          <div class="gauge"><div class="needle" id="fearNeedle" style="left:50%"></div></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="card" style="padding:0;">
        <div class="list-head">
          <div>한글명</div><div class="num">현재가</div><div class="num">수익률</div><div class="num">전략</div>
        </div>
        <div id="coinList"></div>
      </div>
    </div>

    <div class="section">
      <div class="strategy-box">
        <div class="section-title">투자손익 그래프</div>
        <div class="chart-wrap"><canvas id="priceChart" width="380" height="250"></canvas></div>
        <div class="legend" id="chartLegend"></div>
      </div>

      <div class="note-box">
        <div class="section-title">코인별 대응 전략</div>
        <div id="strategyList"></div>
      </div>

      <div class="note-box">
        <div class="section-title">핵심 요약</div>
        <div id="summaryList"></div>
      </div>

      <div class="report-box">
        <div class="section-title">최신 리포트</div>
        <pre id="report">불러오는 중...</pre>
      </div>
    </div>
  </div>

  <script>
    const COLORS = ['#f04f47','#2c7df7','#16c784','#f3ba2f','#a855f7','#22c55e','#ef4444'];
    function addNode(container, html, cls='note-item') {
      const el = document.createElement('div');
      el.className = cls;
      el.innerHTML = html;
      container.appendChild(el);
    }
    function parseFearValue(text) {
      const m = String(text || '').match(/(\d{1,3})/);
      return m ? Math.max(0, Math.min(100, Number(m[1]))) : 50;
    }
    function parseNumber(text) {
      if (typeof text === 'number') return text;
      return Number(String(text || '').replace(/[^0-9.-]/g, '')) || 0;
    }
    function drawChart(seriesMap) {
      const canvas = document.getElementById('priceChart');
      const ctx = canvas.getContext('2d');
      const legend = document.getElementById('chartLegend');
      legend.innerHTML = '';
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const entries = Object.entries(seriesMap || {});
      if (!entries.length) { ctx.fillStyle = '#95a2bf'; ctx.fillText('차트 데이터가 부족합니다.', 20, 30); return; }
      const allVals = entries.flatMap(([, pts]) => pts.map(p => p.price_krw || 0).filter(Boolean));
      const min = Math.min(...allVals), max = Math.max(...allVals);
      const pad = 30, w = canvas.width - pad * 2, h = canvas.height - pad * 2;
      ctx.strokeStyle = '#25324b';
      for (let i=0;i<5;i++) {
        const y = pad + (h/4)*i;
        ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(pad+w,y); ctx.stroke();
      }
      entries.forEach(([symbol, pts], idx) => {
        const vals = pts.filter(p => p.price_krw).map(p => ({...p, price_krw: Number(p.price_krw)}));
        if (!vals.length) return;
        const color = COLORS[idx % COLORS.length];
        ctx.beginPath();
        vals.forEach((p, i) => {
          const x = pad + (vals.length===1 ? w/2 : (i/(vals.length-1))*w);
          const y = pad + h - ((p.price_krw - min)/((max-min)||1))*h;
          if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.strokeStyle = color; ctx.lineWidth = 2.2; ctx.stroke();
        vals.forEach((p, i) => {
          if (p.action === 'BUY' || p.action === 'SELL' || p.action === 'PARTIAL_SELL') {
            const x = pad + (vals.length===1 ? w/2 : (i/(vals.length-1))*w);
            const y = pad + h - ((p.price_krw - min)/((max-min)||1))*h;
            ctx.fillStyle = p.action === 'BUY' ? '#16c784' : '#ff5b6e';
            ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill();
          }
        });
        const li = document.createElement('div');
        li.className = 'legend-item';
        li.innerHTML = `<span class="swatch" style="background:${color}"></span>${symbol}`;
        legend.appendChild(li);
      });
    }
    function updateClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh}:${mm}`;
    }
    async function load() {
      try {
        const [statusRes, reportRes] = await Promise.all([
          fetch('./status.json?_=' + Date.now()),
          fetch('./latest-report.md?_=' + Date.now())
        ]);
        const status = await statusRes.json();
        const report = await reportRes.text();

        const valuation = parseNumber(status.last_valuation_krw);
        const initial = parseNumber(status.initial_cash_krw);
        const profit = valuation - initial;
        document.getElementById('valuation').textContent = status.last_valuation_krw || '-';
        document.getElementById('profitValue').textContent = `${profit >= 0 ? '' : '-'}${Math.abs(profit).toLocaleString()} KRW`;
        document.getElementById('profitValue').className = 'mid ' + (profit >= 0 ? 'up' : 'down');
        document.getElementById('returnPct').textContent = `수익률 ${status.return_pct ?? '-'}%`;
        document.getElementById('cash').textContent = status.cash_krw || '-';
        document.getElementById('judgment').textContent = status.judgment || '-';
        document.getElementById('action').textContent = `추천 행동 ${status.suggested_action || '-'}`;
        document.getElementById('marketStatus').textContent = status.market_status || '-';
        document.getElementById('btcSnapshot').textContent = status.btc_snapshot || '-';
        document.getElementById('confidence').textContent = `신뢰도 ${status.confidence || '-'} · ${status.updated_at || '-'}`;
        document.getElementById('fearGreed').textContent = status.fear_greed || '-';
        const fear = parseFearValue(status.fear_greed);
        document.getElementById('fearNeedle').style.left = `calc(${fear}% - 2px)`;
        document.getElementById('report').textContent = report;

        const coinList = document.getElementById('coinList');
        coinList.innerHTML = '';
        (status.positions || []).forEach((p) => {
          const avg = parseNumber(p.avg_buy_price_krw);
          const last = parseNumber(p.last_price_krw);
          const rate = avg ? (((last - avg) / avg) * 100) : 0;
          const rateCls = rate >= 0 ? 'up' : 'down';
          const row = document.createElement('div');
          row.className = 'coin-row';
          row.innerHTML = `
            <div>
              <div class="coin-name">${p.symbol}</div>
              <div class="coin-sub">${p.market}</div>
            </div>
            <div class="num ${rateCls}">${p.last_price_krw}</div>
            <div class="num ${rateCls}">${rate.toFixed(2)}%</div>
            <div class="num">${p.strategy || '-'}</div>
          `;
          coinList.appendChild(row);
        });
        if (!(status.positions || []).length) {
          const row = document.createElement('div');
          row.className = 'coin-row';
          row.innerHTML = `<div>보유 코인 없음</div><div></div><div></div><div></div>`;
          coinList.appendChild(row);
        }

        const strategyList = document.getElementById('strategyList');
        strategyList.innerHTML = '';
        (status.positions || []).forEach((p) => {
          addNode(strategyList, `<div class="strategy-title">${p.symbol} · ${p.market}</div><div>아이디어: ${p.thesis || '-'}</div><div>대응전략: ${p.strategy || '-'}</div>`, 'strategy-item');
        });
        if (!(status.positions || []).length) addNode(strategyList, `<div class="strategy-title">대기</div><div>아직 편입 코인이 없습니다.</div>`, 'strategy-item');

        const summaryList = document.getElementById('summaryList');
        summaryList.innerHTML = '';
        (status.summary || []).slice(0, 8).forEach((s) => addNode(summaryList, s));

        drawChart(status.chart_series || {});
      } catch (e) {
        document.getElementById('report').textContent = '대시보드 데이터를 불러오지 못했습니다.\n' + e;
      }
    }
    updateClock();
    setInterval(updateClock, 1000 * 20);
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
